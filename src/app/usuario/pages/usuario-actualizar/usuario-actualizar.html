<div class="container-fluid px-4">
  <h2 class="mb-2">Actualizar usuario</h2>
  <hr class="mb-4">

  @if (cargando) {
    <div class="d-flex justify-content-center align-items-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
    </div>
  }

  @if (!cargando) {
    <div style="max-width: 48rem;">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form (ngSubmit)="actualizarUsuario()">

            <!-- Nombre -->
            <div class="mb-3">
              <label class="col-form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                [(ngModel)]="usuario.nombre"
                name="nombre"
                placeholder="Nombre completo"
                required>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label class="col-form-label fw-semibold">Correo electrónico <span class="text-danger">*</span></label>
              <input
                type="email"
                class="form-control"
                [(ngModel)]="usuario.email"
                name="email"
                placeholder="correo@ejemplo.com"
                required>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label class="col-form-label fw-semibold">Contraseña</label>
              <input
                type="password"
                class="form-control"
                [(ngModel)]="usuario.password"
                name="password"
                placeholder="Dejar en blanco para no cambiar">
            </div>

            <!-- Rol -->
            <div class="mb-3">
              <label class="col-form-label fw-semibold">Rol <span class="text-danger">*</span></label>
              <select class="form-select" [(ngModel)]="usuario.rol" name="rol">
                <option value="">Seleccione un rol</option>
                @for (rol of rolesDisponibles; track rol) {
                  <option [value]="rol">{{ rol }}</option>
                }
              </select>
            </div>

            <!-- Activo -->
            <div class="form-check mb-4">
              <input
                type="checkbox"
                class="form-check-input"
                id="activo"
                [(ngModel)]="usuario.activo"
                name="activo">
              <label class="form-check-label" for="activo">Usuario activo</label>
            </div>

            <!-- Botones -->
            <div class="d-flex justify-content-between">
              <button type="button" class="btn btn-secondary" (click)="cancelar()">
                Cancelar
              </button>
              <button type="submit" class="btn btn-primary">
                Actualizar
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  }
</div>
