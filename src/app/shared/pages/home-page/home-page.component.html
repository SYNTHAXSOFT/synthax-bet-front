<div class="lw">

  <!-- Fondo: grid de puntos -->
  <div class="dot-grid"></div>

  <!-- Orbs decorativos animados -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Contenedor central -->
  <div class="lc">

    <!-- Marca -->
    <div class="brand">
      <div class="logo-ring">
        <img src="/assets/img/logo.png" alt="Synthax Bet" />
      </div>
      <h1 class="brand-title">SYNTHAX BET</h1>
      <p class="brand-sub">Análisis inteligente &middot; Picks de alto valor</p>
    </div>

    <!-- Tarjeta glassmorphism -->
    <div class="glass-card">

      <div class="card-head">
        <i class="fa-solid fa-chart-line me-2"></i>Panel de análisis
      </div>

      <form (ngSubmit)="onLogin()" autocomplete="off">

        <!-- Email -->
        <div class="field-wrap mb-3">
          <span class="field-icon"><i class="fa-solid fa-at"></i></span>
          <input
            type="email"
            class="field-input"
            placeholder="Correo electrónico"
            [(ngModel)]="credentials.email"
            name="email"
            required />
        </div>

        <!-- Contraseña -->
        <div class="field-wrap mb-4">
          <span class="field-icon"><i class="fa-solid fa-lock"></i></span>
          <input
            type="password"
            class="field-input"
            placeholder="Contraseña"
            [(ngModel)]="credentials.password"
            name="password"
            required />
        </div>

        <!-- Error -->
        @if (errorMessage) {
          <div class="err-msg mb-3">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>{{ errorMessage }}
          </div>
        }

        <!-- Botón ingresar -->
        <button type="submit" class="btn-enter" [disabled]="cargando">
          @if (cargando) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
          } @else {
            <i class="fa-solid fa-right-to-bracket me-2"></i>
          }
          {{ cargando ? 'Ingresando...' : 'Ingresar' }}
        </button>

      </form>

      <!-- Funcionalidades disponibles -->
      <div class="features-row">
        <div class="feat">
          <i class="fa-solid fa-futbol"></i>
          <span>Partidos</span>
        </div>
        <div class="feat">
          <i class="fa-solid fa-chart-bar"></i>
          <span>Análisis</span>
        </div>
        <div class="feat">
          <i class="fa-solid fa-bullseye"></i>
          <span>Picks</span>
        </div>
        <div class="feat">
          <i class="fa-solid fa-trophy"></i>
          <span>Stats</span>
        </div>
      </div>

    </div>

    <p class="footer-txt">Plataforma privada &middot; Solo acceso autorizado</p>

  </div>
</div>
