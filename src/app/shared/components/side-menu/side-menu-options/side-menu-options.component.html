<div id="nav" class="w-100 px-3">

  @for (item of menuOptions; track item.route) {
    <a
      [routerLink]="item.route"
      routerLinkActive="nav-active"
      class="nav-item w-100 d-flex align-items-center text-decoration-none text-white border-bottom border-secondary py-3 px-2"
      (click)="onSelect()"
    >
      <div class="me-2">
        <i [class]="item.icon"></i>
      </div>
      <div class="d-flex flex-column">
        <span class="fs-6 fw-bold">{{ item.label }}</span>
        <span class="small text-white-50 d-none d-md-block">{{ item.subLabel }}</span>
      </div>
    </a>
  }

  <button
    (click)="logout()"
    class="nav-logout w-100 d-flex align-items-center border-0 border-bottom border-secondary py-3 px-2 mt-3 text-white rounded"
  >
    <div class="me-2">
      <i class="fa-solid fa-right-from-bracket"></i>
    </div>
    <div class="d-flex flex-column">
      <span class="fs-6 fw-bold">Cerrar Sesión</span>
    </div>
  </button>

</div>

<style>
  /* ── Item base ─────────────────────────────────────────── */
  .nav-item {
    border-radius: 10px;
    transition: background-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
  }

  /* ── Hover ─────────────────────────────────────────────── */
  .nav-item:hover {
    background-color: rgba(0, 230, 118, 0.12) !important;
    color: #00e676 !important;
    box-shadow: inset 3px 0 0 #00e676;
  }
  .nav-item:hover i {
    color: #00e676 !important;
  }

  /* ── Activo (routerLinkActive) ─────────────────────────── */
  .nav-active {
    background: linear-gradient(135deg, #00e676 0%, #00c853 100%) !important;
    color: #052a14 !important;
    border-radius: 10px;
    box-shadow: 0 4px 18px rgba(0, 230, 118, 0.35);
    border-bottom-color: transparent !important;
  }
  .nav-active span {
    color: #052a14 !important;
  }
  .nav-active i {
    color: #052a14 !important;
  }
  .nav-active .text-white-50 {
    color: rgba(5, 42, 20, 0.65) !important;
  }

  /* ── Botón cerrar sesión ───────────────────────────────── */
  .nav-logout {
    background-color: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    cursor: pointer;
    transition: background-color 0.18s ease, box-shadow 0.18s ease;
  }
  .nav-logout:hover {
    background-color: rgba(244, 67, 54, 0.15) !important;
    box-shadow: inset 3px 0 0 #f44336;
    color: #ff7070 !important;
  }
  .nav-logout:hover i {
    color: #ff7070 !important;
  }
  .nav-logout i {
    color: #f44336;
    transition: color 0.18s ease;
  }
</style>
